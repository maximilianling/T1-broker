# ================================================================
# T1 BROKER — PRODUCTION NGINX SECURITY CONFIG
# SSL termination, DDoS mitigation, backend masking, WAF headers,
# request filtering, connection limits, and upstream isolation
# ================================================================

# ── Connection & rate limiting zones ──
limit_req_zone $binary_remote_addr zone=api_general:20m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_orders:10m  rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_admin:10m   rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_webhooks:5m rate=50r/s;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

# ── Upstream — never expose backend directly ──
upstream t1_backend {
    server 127.0.0.1:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
    keepalive_timeout 60s;
}

# ── Block known bad bots and scanners ──
map $http_user_agent $bad_bot {
    default         0;
    ~*sqlmap        1;
    ~*nikto         1;
    ~*nmap          1;
    ~*masscan       1;
    ~*zgrab         1;
    ~*dirbuster     1;
    ~*gobuster      1;
    ~*wfuzz         1;
    ~*havij         1;
    ~*acunetix      1;
    ~*nessus        1;
    ~*openvas       1;
}

# ── Block requests with no Host header (scanner signature) ──
map $host $bad_host {
    default     0;
    ""          1;
}

# ═══════════════════════════════════════════════
#  HTTP → HTTPS redirect (force encryption)
# ═══════════════════════════════════════════════
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ACME challenge for cert renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ═══════════════════════════════════════════════
#  MAIN HTTPS SERVER
# ═══════════════════════════════════════════════
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name t1broker.com *.t1broker.com;

    # ── SSL Configuration (A+ rating) ──
    ssl_certificate     /etc/ssl/certs/t1broker.crt;
    ssl_certificate_key /etc/ssl/private/t1broker.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # Diffie-Hellman parameters (generate with: openssl dhparam -out /etc/ssl/dhparam.pem 4096)
    # ssl_dhparam       /etc/ssl/dhparam.pem;

    # ── Global security headers ──
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;  # Modern browsers: CSP handles this
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header X-DNS-Prefetch-Control "off" always;

    # ── COMPLETELY MASK backend identity ──
    server_tokens off;
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;
    proxy_hide_header X-AspNet-Version;
    proxy_hide_header X-AspNetMvc-Version;
    more_clear_headers 'Server';

    # ── Connection limits ──
    limit_conn conn_per_ip 50;

    # ── Body size limits ──
    client_max_body_size 10m;
    client_body_timeout  30s;
    client_header_timeout 10s;
    send_timeout         30s;
    keepalive_timeout    65s;

    # ── Block bad bots and missing hosts ──
    if ($bad_bot) { return 403; }
    if ($bad_host) { return 444; }  # Close connection silently

    # ── Block sensitive file extensions ──
    location ~* \.(env|git|gitignore|dockerignore|sql|bak|log|swp|yml|yaml|toml|lock|sh)$ {
        return 404;
    }

    # ── Block hidden files and directories ──
    location ~ /\. {
        return 404;
    }

    # ── Block common attack paths ──
    location ~* (wp-admin|wp-login|wp-content|phpmyadmin|admin\.php|xmlrpc|cgi-bin) {
        return 444;
    }

    # ═══════════════════════════════════════
    #  API ROUTES — proxied to Node.js
    # ═══════════════════════════════════════

    # Auth endpoints — strict rate limiting
    location /api/v1/auth/ {
        limit_req zone=api_auth burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://t1_backend;
        include /etc/nginx/proxy_params_t1.conf;
    }

    # Order endpoints — moderate rate limiting
    location /api/v1/orders {
        limit_req zone=api_orders burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://t1_backend;
        include /etc/nginx/proxy_params_t1.conf;
    }

    # Admin endpoints — rate limited + IP restriction
    location /api/v1/admin/ {
        limit_req zone=api_admin burst=20 nodelay;
        limit_req_status 429;

        # Optional: restrict admin API to VPN / office IPs
        # allow 10.0.0.0/8;
        # allow 192.168.0.0/16;
        # deny all;

        proxy_pass http://t1_backend;
        include /etc/nginx/proxy_params_t1.conf;
    }

    # Webhook endpoints — higher rate limit (Saxo/DriveWealth callbacks)
    location /api/v1/webhooks/ {
        limit_req zone=api_webhooks burst=100 nodelay;

        proxy_pass http://t1_backend;
        include /etc/nginx/proxy_params_t1.conf;
    }

    # Health check — no rate limit, no auth
    location /api/v1/health {
        proxy_pass http://t1_backend;
        proxy_set_header Host $host;
    }

    # All other API routes
    location /api/ {
        limit_req zone=api_general burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://t1_backend;
        include /etc/nginx/proxy_params_t1.conf;
    }

    # ═══════════════════════════════════════
    #  WebSocket — live market data
    # ═══════════════════════════════════════
    location /ws {
        proxy_pass http://t1_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ═══════════════════════════════════════
    #  Static files — served by nginx directly
    # ═══════════════════════════════════════
    location /static/ {
        alias /srv/t1broker/client/public/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Admin HTML pages — require HTTPS ──
    location ~* ^/(admin-config|admin-settings|admin-backups)\.html$ {
        root /srv/t1broker/client/public;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ═══════════════════════════════════════
    #  SPA catch-all — index.html
    # ═══════════════════════════════════════
    location / {
        root /srv/t1broker/client/public;
        try_files $uri $uri/ /index.html;

        add_header Cache-Control "no-cache" always;
    }

    # ═══════════════════════════════════════
    #  Error pages — custom (don't leak nginx version)
    # ═══════════════════════════════════════
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
