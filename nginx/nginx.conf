worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;
worker_rlimit_nofile 4096;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # HIDE SERVER IDENTITY
    server_tokens off;

    # Logging with security context
    log_format security '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       'rt=$request_time req_id=$http_x_request_id '
                       'ssl=$ssl_protocol cipher=$ssl_cipher';
    access_log /var/log/nginx/access.log security;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # PREVENT BUFFER OVERFLOW ATTACKS
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    client_max_body_size 10m;

    # TIMEOUTS — Prevent slowloris attacks
    client_body_timeout 12s;
    client_header_timeout 12s;
    send_timeout 10s;

    # Gzip (min 1KB — BREACH attack mitigation)
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ── RATE LIMITING ZONES ──
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=admin:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=ws:5m rate=2r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;
    limit_req_status 429;
    limit_conn_status 429;

    # ── BOT / SCANNER DETECTION ──
    # Block known vulnerability scanners, bad bots, and automated tools
    map $http_user_agent $bad_bot {
        default 0;
        ~*sqlmap            1;
        ~*nikto             1;
        ~*nessus            1;
        ~*dirbuster         1;
        ~*gobuster          1;
        ~*wpscan            1;
        ~*masscan           1;
        ~*zgrab             1;
        ~*nuclei            1;
        ~*httpx             1;
        ~*nmap              1;
        ~*censys            1;
        ~*shodan            1;
        ~*python-requests   1;
        ~*go-http-client    1;
        ~*curl/             1;
        ~*wget/             1;
        ~*scrapy            1;
        ~*bot               1;
        ~*crawler           1;
        ~*spider            1;
        ""                  1;
    }

    # Map to block requests without valid Host header
    map $http_host $bad_host {
        default 1;
        "app.t1broker.com" 0;
        "api.t1broker.com" 0;
        "localhost"        0;
        "~^127\."          0;
    }

    upstream t1_backend {
        least_conn;
        server app:3000;
        keepalive 32;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location / { return 301 https://$host$request_uri; }
    }

    # ── MAIN HTTPS SERVER ──
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name app.t1broker.com api.t1broker.com;

        # TLS (A+ grade: TLS 1.3 only, strong ciphers)
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # ── SECURITY HEADERS ──
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' wss://app.t1broker.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

        limit_conn addr 100;

        # ── BLOCK BAD BOTS & SCANNERS ──
        if ($bad_bot) { return 444; }

        # ── BLOCK REQUESTS WITHOUT VALID HOST ──
        # In production, reject requests to IP or unknown hosts
        # (Uncomment in production after DNS is configured)
        # if ($bad_host) { return 444; }

        # ── STRIP UPSTREAM HEADERS THAT LEAK INFO ──
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
        proxy_hide_header X-AspNet-Version;
        proxy_hide_header X-Runtime;

        # ── BLOCK ATTACK VECTORS ──
        location ~* (\.env|\.git|\.svn|\.htaccess|\.htpasswd|\.DS_Store|\.bak|\.swp|\.sql|\.log|\.ini|\.conf|\.yml|\.yaml|\.toml|Dockerfile|docker-compose|Makefile|package\.json|package-lock|yarn\.lock) {
            deny all; return 404;
        }
        location ~* \.(php|asp|aspx|jsp|cgi|pl|py|rb|sh|bat|cmd|exe|dll)$ {
            deny all; return 404;
        }
        location ~ /\. { deny all; return 404; }
        location ~* (wp-admin|wp-login|wp-content|wp-includes|xmlrpc|phpmyadmin|adminer|shell|cgi-bin|\.aws|actuator) {
            deny all; return 404;
        }

        # ── ADMIN PAGES — Restricted ──
        location ~ ^/(admin-config|admin-settings|admin-backups)\.html$ {
            limit_req zone=admin burst=5 nodelay;
            proxy_pass http://t1_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            add_header Pragma "no-cache" always;
        }

        # ── ADMIN API — Extra protection ──
        location /api/v1/admin/ {
            limit_req zone=admin burst=10 nodelay;
            proxy_pass http://t1_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        # ── AUTH — Strict rate limit ──
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://t1_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        location /api/v1/mfa/ {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass http://t1_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        # ── GENERAL API ──
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://t1_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            proxy_intercept_errors on;
        }

        # ── WEBSOCKET — Rate limited ──
        location /ws {
            limit_req zone=ws burst=5 nodelay;
            proxy_pass http://t1_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── HEALTH — No rate limit, no logging ──
        location /api/v1/health {
            access_log off;
            proxy_pass http://t1_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ── STATIC ASSETS ──
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            proxy_pass http://t1_backend;
            expires 1d;
            add_header Cache-Control "public, immutable" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # ── SECURITY.TXT ──
        location /.well-known/security.txt {
            return 200 "Contact: security@t1broker.com\nExpires: 2027-01-01T00:00:00.000Z\nPreferred-Languages: en\n";
            add_header Content-Type "text/plain" always;
        }

        # ── ROBOTS.TXT — Block crawlers from API/admin ──
        location /robots.txt {
            return 200 "User-agent: *\nDisallow: /api/\nDisallow: /admin-\nDisallow: /ws\n";
            add_header Content-Type "text/plain" always;
        }

        # ── FRONTEND SPA ──
        location / {
            proxy_pass http://t1_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
