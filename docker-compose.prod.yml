version: '3.9'

# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  postgres:
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    environment:
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    command: >
      postgres
        -c shared_buffers=1GB
        -c effective_cache_size=3GB
        -c maintenance_work_mem=256MB
        -c max_connections=200
        -c work_mem=16MB
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c checkpoint_completion_target=0.9
        -c wal_buffers=64MB
        -c max_wal_size=2GB
        -c min_wal_size=1GB
        -c log_min_duration_statement=100
        -c log_statement=mod
        -c ssl=on
        -c ssl_cert_file=/var/lib/postgresql/server.crt
        -c ssl_key_file=/var/lib/postgresql/server.key
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  redis:
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    command: >
      redis-server
        --appendonly yes
        --requirepass ${REDIS_PASSWORD}
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --tcp-backlog 511
        --timeout 0
        --tcp-keepalive 300
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  app:
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    environment:
      NODE_ENV: production
      DB_SSL: "true"
      DB_POOL_MIN: 5
      DB_POOL_MAX: 30
      LOG_LEVEL: info
      CORS_ORIGIN: "https://app.t1broker.com"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
    restart: always

  # ============================================================
  # NGINX Reverse Proxy (TLS termination)
  # ============================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: t1-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
