version: '3.9'

services:
  # ============================================================
  # PostgreSQL Database
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: t1-postgres
    environment:
      POSTGRES_DB: t1broker
      POSTGRES_USER: t1admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-T1Broker_DB_2025!}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U t1admin -d t1broker"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================
  # Redis (Session cache, rate limiting, pub/sub)
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: t1-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-T1Redis_2025!}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ============================================================
  # T1 Broker Application
  # ============================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: t1-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: t1broker
      DB_USER: t1admin
      DB_PASSWORD: ${DB_PASSWORD:-T1Broker_DB_2025!}
      JWT_SECRET: ${JWT_SECRET:-a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-f6e5d4c3b2a1f6e5d4c3b2a1f6e5d4c3b2a1f6e5d4c3b2a1f6e5d4c3b2a1f6e5}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
