<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>T1 Broker — Platform Settings</title>
<style>
:root{--bg:#0a0f1c;--bg2:#111827;--bg3:#1e293b;--card:#151d2e;--border:#1e293b;--text:#f0f4ff;--text2:#94a3b8;--text3:#64748b;--blue:#3b82f6;--blue2:#2563eb;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--purple:#a855f7;--orange:#f97316;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{display:flex;height:100vh}

/* Sidebar */
.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--border);padding:16px 12px;flex-shrink:0;overflow-y:auto;display:flex;flex-direction:column}
.sidebar h2{color:var(--blue);font-size:15px;padding:8px;margin-bottom:8px;font-family:'Courier New',monospace}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:13px;transition:all .15s;margin-bottom:2px}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(59,130,246,.12);color:var(--blue)}
.nav-count{margin-left:auto;font-size:11px;color:var(--text3);background:var(--bg3);padding:2px 7px;border-radius:10px}

/* Main */
.main{flex:1;overflow-y:auto;padding:24px 32px}
h1{font-size:22px;font-weight:700;margin-bottom:4px}
.subtitle{color:var(--text3);font-size:13px;margin-bottom:24px}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.top-bar h1{margin-bottom:0}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.card-title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.card-desc{color:var(--text3);font-size:12px;margin-top:2px}

/* Settings rows */
.setting-row{display:grid;grid-template-columns:280px 1fr auto;gap:16px;align-items:start;padding:14px 0;border-bottom:1px solid var(--border)}
.setting-row:last-child{border-bottom:none}
.setting-label{font-size:13px;font-weight:600}
.setting-desc{font-size:11px;color:var(--text3);margin-top:3px;line-height:1.4}
.setting-key{font-size:10px;color:var(--text3);font-family:'Courier New',monospace;margin-top:3px;opacity:.6}
.setting-input{display:flex;align-items:center;gap:8px;min-width:0}
.setting-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;min-width:90px}

/* Inputs */
input[type=text],input[type=number],select,textarea{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 12px;font-size:13px;width:100%;outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
input[type=number]{width:140px}
textarea{font-family:inherit;resize:vertical;min-height:60px}

/* Toggle */
.toggle{position:relative;width:44px;height:24px;flex-shrink:0;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.toggle .slider{position:absolute;inset:0;background:var(--bg3);border-radius:12px;transition:.2s}
.toggle .slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;bottom:3px;background:var(--text3);border-radius:50%;transition:.2s}
.toggle input:checked+.slider{background:var(--blue)}
.toggle input:checked+.slider:before{transform:translateX(20px);background:white}

/* Buttons */
.btn{padding:7px 16px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-primary{background:var(--blue);color:white}.btn-primary:hover{background:var(--blue2)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{background:var(--bg3)}
.btn-green{background:rgba(34,197,94,.15);color:var(--green)}.btn-green:hover{background:rgba(34,197,94,.25)}
.btn-red{background:rgba(239,68,68,.1);color:var(--red)}.btn-red:hover{background:rgba(239,68,68,.2)}
.btn-yellow{background:rgba(234,179,8,.1);color:var(--yellow)}.btn-yellow:hover{background:rgba(234,179,8,.2)}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge.green{background:rgba(34,197,94,.12);color:var(--green)}
.badge.yellow{background:rgba(234,179,8,.12);color:var(--yellow)}
.badge.red{background:rgba(239,68,68,.12);color:var(--red)}
.badge.blue{background:rgba(59,130,246,.12);color:var(--blue)}
.badge.gray{background:rgba(100,116,139,.12);color:var(--text3)}
.badge.purple{background:rgba(168,85,247,.12);color:var(--purple)}

/* Pending dot */
.pending-dot{width:8px;height:8px;border-radius:4px;background:var(--yellow);display:inline-block}
.changed-indicator{font-size:10px;color:var(--yellow);font-weight:600}

/* Search */
.search-bar{position:relative;margin-bottom:24px}
.search-bar input{padding-left:36px;background:var(--bg2)}
.search-bar::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:white;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;opacity:0;transform:translateY(20px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.error{background:var(--red)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:90%;max-width:700px;max-height:80vh;overflow-y:auto}
.modal h3{font-size:16px;margin-bottom:16px}

/* Audit table */
.audit-table{font-size:12px}
.audit-table th{font-size:10px;padding:6px 10px}
.audit-table td{padding:8px 10px;font-size:12px}
.audit-old{color:var(--red);text-decoration:line-through}
.audit-new{color:var(--green)}

/* Responsive */
@media(max-width:900px){.sidebar{display:none}.main{padding:16px}.setting-row{grid-template-columns:1fr;gap:8px}.setting-meta{flex-direction:row;align-items:center}}
</style>
</head>
<body>
<div class="app">
  <nav class="sidebar">
    <h2>🎛️ T1 Settings</h2>
    <div id="nav-items"></div>
    <div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border)">
      <a href="/admin-config.html" class="nav-item" style="text-decoration:none;color:var(--text2)">⚙️ Configuration</a>
      <a href="/admin-security.html" class="nav-item" style="text-decoration:none;color:var(--text2)">🛡️ Security Center</a>
      <a href="/admin-backups.html" class="nav-item" style="text-decoration:none;color:var(--text2)">💾 Database Archives</a>
    </div>
    <div style="margin-top:auto;padding:16px 8px;border-top:1px solid var(--border)">
      <a href="/" style="color:var(--text3);text-decoration:none;font-size:12px">← Back to Dashboard</a>
    </div>
  </nav>

  <main class="main">
    <div class="top-bar">
      <div>
        <h1>Platform Settings</h1>
        <p class="subtitle">Tune every operational parameter — margin, trading, security, notifications, and more.</p>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost" onclick="showAuditLog()">📋 Audit Log</button>
        <button class="btn btn-primary" id="save-btn" style="display:none" onclick="saveAllChanges()">💾 Save Changes (<span id="change-count">0</span>)</button>
      </div>
    </div>

    <div class="search-bar">
      <input type="text" id="search" placeholder="Search settings..." oninput="filterSettings(this.value)">
    </div>

    <div id="content"></div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api/v1/admin/settings';
let token = localStorage.getItem('t1_access') || '';
let allSettings = [];
let grouped = {};
let pendingChanges = {};
let currentCategory = null;

const CATEGORY_META = {
  trading:       { icon: '📈', label: 'Trading', desc: 'Commission rates, order limits, market hours, settlement' },
  margin:        { icon: '⚖️', label: 'Margin & Risk', desc: 'Margin ratios, liquidation thresholds, margin call rules' },
  limits:        { icon: '🚧', label: 'Limits', desc: 'Order size caps, withdrawal limits, leverage, position limits' },
  kyc:           { icon: '🪪', label: 'KYC & Compliance', desc: 'Document requirements, auto-approval, re-verification' },
  security:      { icon: '🔒', label: 'Security', desc: 'JWT expiry, login lockout, MFA, session timeout, IP whitelist' },
  ratelimit:     { icon: '🚦', label: 'Rate Limits', desc: 'API, auth, order, transfer, WebSocket rate limits' },
  notifications: { icon: '🔔', label: 'Notifications', desc: 'Email, push, SMS, daily summaries, margin alert channels' },
  branding:      { icon: '🎨', label: 'Branding', desc: 'Platform name, legal name, URLs, colors, logo' },
  system:        { icon: '🖥️', label: 'System', desc: 'Maintenance mode, demo mode, log level, backups, settlement schedule' },
  fees:          { icon: '💰', label: 'Fees & Commissions', desc: 'Per-asset commission rates, withdrawal fees, custody, inactivity fees' },
};

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(`${API}${path}`, opts);
  return res.json();
}

// ── Load all settings ──
async function loadSettings() {
  const res = await api('GET', '');
  allSettings = res.data || [];
  grouped = res.grouped || {};

  // Build sidebar nav
  const nav = document.getElementById('nav-items');
  nav.innerHTML = Object.keys(grouped).map(cat => {
    const meta = CATEGORY_META[cat] || { icon: '📁', label: cat, desc: '' };
    return `<div class="nav-item ${currentCategory === cat ? 'active' : ''}" onclick="showCategory('${cat}')">
      ${meta.icon} ${meta.label}
      <span class="nav-count">${grouped[cat].length}</span>
    </div>`;
  }).join('');

  // Show first category if none selected
  if (!currentCategory && Object.keys(grouped).length) {
    showCategory(Object.keys(grouped)[0]);
  } else if (currentCategory) {
    renderCategory(currentCategory);
  }
}

// ── Show category ──
function showCategory(cat) {
  currentCategory = cat;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navItems = document.querySelectorAll('.nav-item');
  navItems.forEach(el => { if (el.textContent.includes(CATEGORY_META[cat]?.label || cat)) el.classList.add('active'); });
  renderCategory(cat);
}

// ── Render settings for a category ──
function renderCategory(cat) {
  const settings = grouped[cat] || [];
  const meta = CATEGORY_META[cat] || { icon: '📁', label: cat, desc: '' };

  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">${meta.icon} ${meta.label}</div>
          <div class="card-desc">${meta.desc}</div>
        </div>
        <div style="display:flex;gap:8px">
          <span class="badge gray">${settings.length} settings</span>
        </div>
      </div>

      ${settings.map(s => renderSettingRow(s)).join('')}
    </div>
  `;
}

// ── Render single setting row ──
function renderSettingRow(s) {
  const isPending = pendingChanges[s.key] !== undefined;
  const displayValue = isPending ? pendingChanges[s.key] : s.value;
  const isDefault = s.value === s.default_value;

  return `<div class="setting-row" id="row-${cssKey(s.key)}" data-key="${s.key}" data-search="${s.label.toLowerCase()} ${s.key.toLowerCase()} ${(s.description||'').toLowerCase()}">
    <div>
      <div class="setting-label">${s.label} ${isPending ? '<span class="pending-dot" title="Unsaved change"></span>' : ''}</div>
      <div class="setting-desc">${s.description || ''}</div>
      <div class="setting-key">${s.key}</div>
    </div>

    <div class="setting-input">
      ${renderInput(s, displayValue)}
    </div>

    <div class="setting-meta">
      ${s.requires_restart ? '<span class="badge yellow">restart</span>' : ''}
      ${s.is_sensitive ? '<span class="badge purple">sensitive</span>' : ''}
      ${!isDefault ? `<button class="btn btn-ghost btn-sm" onclick="resetSetting('${s.key}')" title="Reset to: ${esc(s.default_value)}">↩ Reset</button>` : '<span class="badge gray">default</span>'}
      ${s.updated_at ? `<span style="font-size:10px;color:var(--text3)" title="${s.updated_at}">${timeAgo(s.updated_at)}</span>` : ''}
    </div>
  </div>`;
}

// ── Render appropriate input widget ──
function renderInput(s, value) {
  const key = s.key;

  if (s.value_type === 'boolean') {
    const checked = value === 'true' || value === true;
    return `<label class="toggle">
      <input type="checkbox" ${checked ? 'checked' : ''} onchange="onChange('${key}', this.checked ? 'true' : 'false')">
      <span class="slider"></span>
    </label>
    <span style="font-size:12px;color:${checked ? 'var(--green)' : 'var(--text3)'}">${checked ? 'Enabled' : 'Disabled'}</span>`;
  }

  if (s.value_type === 'number') {
    const min = s.min_value !== null ? `min="${s.min_value}"` : '';
    const max = s.max_value !== null ? `max="${s.max_value}"` : '';
    const range = (s.min_value !== null || s.max_value !== null)
      ? `<span style="font-size:10px;color:var(--text3)">${s.min_value ?? '–∞'} — ${s.max_value ?? '∞'}</span>` : '';
    return `<input type="number" value="${esc(value)}" ${min} ${max} step="any"
      onchange="onChange('${key}', this.value)" style="width:160px">
    ${range}`;
  }

  if (s.value_type === 'json') {
    const formatted = typeof value === 'string' ? value : JSON.stringify(value, null, 2);
    return `<textarea rows="3" onchange="onChange('${key}', this.value)"
      style="font-family:'Courier New',monospace;font-size:12px;width:100%">${esc(formatted)}</textarea>`;
  }

  // string / secret
  if (s.allowed_values && Array.isArray(s.allowed_values) && s.allowed_values.length) {
    const opts = s.allowed_values;
    return `<select onchange="onChange('${key}', this.value)">
      ${opts.map(o => `<option value="${o}" ${o === value ? 'selected' : ''}>${o}</option>`).join('')}
    </select>`;
  }

  // Color picker for hex colors
  if (key.includes('color') && /^#[0-9a-fA-F]{6}$/.test(value)) {
    return `<div style="display:flex;align-items:center;gap:8px">
      <input type="color" value="${esc(value)}" onchange="onChange('${key}', this.value);this.nextElementSibling.value=this.value" style="width:40px;height:36px;border:none;cursor:pointer;background:transparent">
      <input type="text" value="${esc(value)}" onchange="onChange('${key}', this.value);this.previousElementSibling.value=this.value" style="width:120px;font-family:'Courier New',monospace">
    </div>`;
  }

  // URL fields
  if (key.includes('url') || key.includes('email')) {
    return `<input type="text" value="${esc(value)}" onchange="onChange('${key}', this.value)" style="width:100%">`;
  }

  // Default text
  return `<input type="text" value="${esc(value)}" onchange="onChange('${key}', this.value)"
    style="width:${value && value.length > 20 ? '100%' : '240px'}">`;
}

// ── Track changes ──
function onChange(key, value) {
  const original = allSettings.find(s => s.key === key);
  if (!original) return;

  const origVal = String(original.value);
  if (value === origVal) {
    delete pendingChanges[key];
  } else {
    pendingChanges[key] = value;
  }

  // Update pending indicator on row
  const row = document.getElementById(`row-${cssKey(key)}`);
  if (row) {
    const label = row.querySelector('.setting-label');
    const dot = label.querySelector('.pending-dot');
    if (pendingChanges[key] !== undefined && !dot) {
      label.insertAdjacentHTML('beforeend', ' <span class="pending-dot" title="Unsaved change"></span>');
    } else if (pendingChanges[key] === undefined && dot) {
      dot.remove();
    }
  }

  updateSaveButton();
}

function updateSaveButton() {
  const count = Object.keys(pendingChanges).length;
  const btn = document.getElementById('save-btn');
  const span = document.getElementById('change-count');
  btn.style.display = count > 0 ? 'inline-flex' : 'none';
  span.textContent = count;
}

// ── Save all pending changes ──
async function saveAllChanges() {
  const count = Object.keys(pendingChanges).length;
  if (!count) return;

  const btn = document.getElementById('save-btn');
  btn.textContent = '⏳ Saving...';
  btn.disabled = true;

  try {
    const res = await api('PUT', '', {
      updates: pendingChanges,
      reason: `Bulk update: ${count} settings`,
    });

    if (res.errors && res.errors.length) {
      const errMsgs = res.errors.map(e => `${e.key}: ${e.error}`).join('\n');
      toast(`⚠️ ${res.updated} saved, ${res.errors.length} failed`, 'error');
      alert('Some settings failed to save:\n\n' + errMsgs);
    } else {
      toast(`✅ ${count} setting${count > 1 ? 's' : ''} saved`);
      if (res.requiresRestart) {
        toast('⚠️ Server restart required for some changes', 'error');
      }
    }

    pendingChanges = {};
    updateSaveButton();
    await loadSettings();
  } catch (err) {
    toast('❌ Save failed: ' + err.message, 'error');
  } finally {
    btn.textContent = '💾 Save Changes (0)';
    btn.disabled = false;
  }
}

// ── Reset single setting ──
async function resetSetting(key) {
  const setting = allSettings.find(s => s.key === key);
  if (!setting) return;
  if (!confirm(`Reset "${setting.label}" to default value:\n${setting.default_value}`)) return;

  try {
    await api('POST', `/${encodeURIComponent(key)}/reset`);
    delete pendingChanges[key];
    updateSaveButton();
    toast(`↩ Reset "${setting.label}" to default`);
    await loadSettings();
  } catch (err) {
    toast('❌ Reset failed', 'error');
  }
}

// ── Search / filter ──
function filterSettings(query) {
  const q = query.toLowerCase().trim();
  if (!q) {
    // Show current category view
    if (currentCategory) renderCategory(currentCategory);
    return;
  }

  // Search across ALL settings
  const matches = allSettings.filter(s =>
    s.label.toLowerCase().includes(q) ||
    s.key.toLowerCase().includes(q) ||
    (s.description || '').toLowerCase().includes(q)
  );

  const content = document.getElementById('content');
  if (!matches.length) {
    content.innerHTML = '<div class="card" style="text-align:center;padding:40px"><span style="font-size:32px">🔍</span><p style="color:var(--text3);margin-top:8px">No settings match "<strong>' + esc(query) + '</strong>"</p></div>';
    return;
  }

  content.innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="card-title">🔍 Search Results</div>
        <span class="badge blue">${matches.length} match${matches.length > 1 ? 'es' : ''}</span>
      </div>
      ${matches.map(s => renderSettingRow(s)).join('')}
    </div>
  `;
}

// ── Audit log modal ──
async function showAuditLog() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `<div class="modal">
    <h3>📋 Settings Change History</h3>
    <p style="color:var(--text3);font-size:12px;margin-bottom:16px">Last 100 changes across all settings</p>
    <div id="audit-content" style="color:var(--text3);font-size:13px">Loading...</div>
    <div style="text-align:right;margin-top:16px">
      <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Close</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);

  try {
    const res = await api('GET', '/audit?limit=100');
    const logs = res.data || [];

    if (!logs.length) {
      document.getElementById('audit-content').innerHTML = '<p style="text-align:center;padding:20px">No changes recorded yet.</p>';
      return;
    }

    document.getElementById('audit-content').innerHTML = `
      <div style="max-height:400px;overflow-y:auto">
        <table class="audit-table" style="width:100%">
          <thead><tr>
            <th>Setting</th><th>Old → New</th><th>Changed By</th><th>Reason</th><th>When</th>
          </tr></thead>
          <tbody>
            ${logs.map(l => `<tr>
              <td><code style="font-size:11px;color:var(--blue)">${esc(l.setting_key)}</code></td>
              <td>
                <span class="audit-old">${esc(truncate(l.old_value, 30))}</span>
                → <span class="audit-new">${esc(truncate(l.new_value, 30))}</span>
              </td>
              <td style="font-size:11px">${esc(l.changed_by_email)}</td>
              <td style="font-size:11px;color:var(--text3)">${esc(l.reason || '—')}</td>
              <td style="font-size:11px;color:var(--text3);white-space:nowrap">${timeAgo(l.changed_at)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    `;
  } catch (err) {
    document.getElementById('audit-content').innerHTML = '<p style="color:var(--red)">Failed to load audit log</p>';
  }
}

// ── Helpers ──
function cssKey(key) { return key.replace(/\./g, '-').replace(/[^a-zA-Z0-9_-]/g, ''); }
function esc(s) { if (s === null || s === undefined) return ''; const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }
function truncate(s, n) { if (!s) return ''; return s.length > n ? s.slice(0, n) + '…' : s; }
function timeAgo(ts) {
  if (!ts) return '';
  const diff = Date.now() - new Date(ts).getTime();
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
  if (diff < 2592000000) return Math.floor(diff / 86400000) + 'd ago';
  return new Date(ts).toLocaleDateString();
}

function toast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type === 'error' ? ' error' : '');
  setTimeout(() => t.className = 'toast', 3000);
}

// ── Warn on unsaved changes ──
window.addEventListener('beforeunload', (e) => {
  if (Object.keys(pendingChanges).length) {
    e.preventDefault();
    e.returnValue = '';
  }
});

// ── Init ──
loadSettings();
</script>
</body>
</html>
