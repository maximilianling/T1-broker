---
# ================================================================
# T1 BROKER — KUBERNETES NAMESPACE
# ================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: t1-broker
  labels:
    app: t1-broker
    environment: production

---
# ================================================================
# SECRETS (use external secrets operator or Vault in production)
# ================================================================
apiVersion: v1
kind: Secret
metadata:
  name: t1-broker-secrets
  namespace: t1-broker
type: Opaque
stringData:
  DB_PASSWORD: "REPLACE_WITH_REAL_SECRET"
  JWT_SECRET: "REPLACE_WITH_REAL_SECRET"
  JWT_REFRESH_SECRET: "REPLACE_WITH_REAL_SECRET"
  ENCRYPTION_KEY: "REPLACE_WITH_REAL_SECRET"
  REDIS_PASSWORD: "REPLACE_WITH_REAL_SECRET"
  SAXO_APP_SECRET: "REPLACE_WITH_REAL_SECRET"
  DW_API_SECRET: "REPLACE_WITH_REAL_SECRET"

---
# ================================================================
# CONFIGMAP
# ================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: t1-broker-config
  namespace: t1-broker
data:
  NODE_ENV: "production"
  PORT: "3000"
  API_PREFIX: "/api/v1"
  DB_HOST: "t1-postgres"
  DB_PORT: "5432"
  DB_NAME: "t1broker"
  DB_USER: "t1admin"
  DB_SSL: "true"
  REDIS_HOST: "t1-redis"
  REDIS_PORT: "6379"
  LOG_LEVEL: "info"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX: "200"
  MFA_ISSUER: "T1Broker"

---
# ================================================================
# APPLICATION DEPLOYMENT
# ================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: t1-broker-app
  namespace: t1-broker
  labels:
    app: t1-broker
    component: api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: t1-broker
      component: api
  template:
    metadata:
      labels:
        app: t1-broker
        component: api
    spec:
      serviceAccountName: t1-broker-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: ghcr.io/t1-broker/platform:latest
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: t1-broker-config
            - secretRef:
                name: t1-broker-secrets
          env:
            - name: CORS_ORIGIN
              value: "https://app.t1broker.com"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/v1/ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/live
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: t1-broker

---
# ================================================================
# SERVICE
# ================================================================
apiVersion: v1
kind: Service
metadata:
  name: t1-broker-svc
  namespace: t1-broker
spec:
  selector:
    app: t1-broker
    component: api
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
  type: ClusterIP

---
# ================================================================
# HORIZONTAL POD AUTOSCALER
# ================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: t1-broker-hpa
  namespace: t1-broker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: t1-broker-app
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# ================================================================
# INGRESS (with TLS)
# ================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: t1-broker-ingress
  namespace: t1-broker
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  tls:
    - hosts:
        - app.t1broker.com
        - api.t1broker.com
      secretName: t1-broker-tls
  rules:
    - host: app.t1broker.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: t1-broker-svc
                port:
                  number: 80
    - host: api.t1broker.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: t1-broker-svc
                port:
                  number: 80

---
# ================================================================
# POD DISRUPTION BUDGET (maintain availability during updates)
# ================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: t1-broker-pdb
  namespace: t1-broker
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: t1-broker
      component: api

---
# ================================================================
# SERVICE ACCOUNT
# ================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: t1-broker-sa
  namespace: t1-broker

---
# ================================================================
# NETWORK POLICY (restrict traffic)
# ================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: t1-broker-netpol
  namespace: t1-broker
spec:
  podSelector:
    matchLabels:
      app: t1-broker
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - to: []  # Allow all egress (needed for broker APIs)
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
